services:

  rag-api:
    build: .

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - ./data/vector_db:/app/data/vector_db

    environment:
      - OLLAMA_HOST=http://ollama:11434

    depends_on:
      - ollama

  ollama:
    image: ollama/ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile

    ports:
      - "8501:8501"

    depends_on:
      - rag-api
    

volumes:
  ollama_data: